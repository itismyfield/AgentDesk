id: E-18
title: cancel_turn 중단 후 late marker 미전송 보장
cells: [claude-pipe, claude-tui, codex-pipe, codex-tui]
isolation: required
destructive: true
acceptance_criteria:
  - Dispatch a long turn that emits [E2E:E18:OK] before the late sentinel.
  - Execute cancel_turn while the turn is still active.
  - Assert [E2E:E18:LATE] is absent from relay output after cancellation.
  - Assert health counters drain to global_active=0 and global_finalizing=0.
notes: |
  Live #2937 coverage. This remains destructive-gated and intentionally omits
  claude-e because the stop/cancel path under test is the relay-backed
  pipe/TUI turn lifecycle. The prompt is oversized so the OK marker can be
  observed before the late sentinel chunk is eligible for relay.
steps:
  - send_prompt: |
      첫 줄에는 정확히 "[E2E:E18:OK]"만 출력해줘.
      그 다음부터 900줄을 "E18-LINE-NNN" 형식의 번호와 함께 작성해줘.
      900번째 마지막 줄에 도달하기 전에는 절대 "[E2E:E18:LATE]"를 출력하지 말고,
      정말 마지막 줄에서만 "[E2E:E18:LATE]"를 출력해줘.
  - wait_for_discord_text: "[E2E:E18:OK]"
    timeout_s: 180
  - cancel_turn:
      force: true
      timeout_s: 15
  - wait_idle_s: 15
  - assert_health:
      forbid_degraded_reasons:
        - global_active_counter_out_of_bounds
      global_active_max: 0
      global_finalizing_max: 0
assertions:
  - raw_message_count_between_markers:
      min: 1
      max: 36
  - relay_latency_within:
      max_seconds: 180
  - text_present: "[E2E:E18:OK]"
  - marker_absent:
      marker: "[E2E:E18:LATE]"
      surface: relay
  - no_duplicate_content: true
  - no_suppressed_label_chrome: true
