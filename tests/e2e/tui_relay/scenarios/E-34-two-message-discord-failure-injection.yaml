id: E-34
title: two-message recovery converges after injected Discord send and delete failures
agent_mode: real_live
coverage_class: live
cells: [claude-pipe, claude-tui, codex-pipe, codex-tui]
isolation: required
destructive: true
requires_features: [two_message_panel, e2e_discord_control]
notes: |
  #4488 PR-F failure-path coverage. The first restart consumes an injected panel
  send failure and must preserve the missing durable handle without corrupting
  the answer. The second restart recreates the panel while an injected old-panel
  delete failure exercises durable orphan fallback. A final restart proves the
  orphan/recovery protocol converges to one bottom panel.
steps:
  - send_timed_response_prompt:
      before_marker: "[E2E:E34:BEFORE]"
      after_marker: "[E2E:E34:AFTER]"
      hold_seconds: 90
  - wait_for_discord_text: "[E2E:E34:BEFORE]"
    timeout_s: 180
  - wait_for_raw_discord_text: "진행 중"
    timeout_s: 60
  - delete_status_panel: {}
  - inject_discord_failure:
      operation: send
      count: 1
  - restart_dcserver: {}
  - wait_idle_s: 5
  - inject_discord_failure:
      operation: delete
      count: 1
  - restart_dcserver: {}
  - wait_idle_s: 5
  - restart_dcserver: {}
  - wait_for_discord_text: "[E2E:E34:AFTER]"
    timeout_s: 300
  - wait_idle_s: 5
assertions:
  - ordered_text_present:
      - "[E2E:E34:BEFORE]"
      - "[E2E:E34:AFTER]"
  - no_duplicate_marker: "[E2E:E34:BEFORE]"
  - no_duplicate_marker: "[E2E:E34:AFTER]"
  - body_not_overwritten: "[E2E:E34:BEFORE]"
  - status_panel_after_body:
      body_marker: "[E2E:E34:AFTER]"
  - single_status_panel: true
